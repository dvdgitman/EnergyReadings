name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/energy-pipeline

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ingestion-api deps
        run: pip install -r ingestion-api/requirements.txt

      - name: Install processing-svc deps
        run: pip install -r processing-svc/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 ingestion-api/main.py processing-svc/main.py --max-line-length=120

  helm-validate:
    name: Helm Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint helm/energy-pipeline

      - name: Helm template (dry-run render)
        run: helm template energy-pipeline helm/energy-pipeline --debug

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint-and-test, helm-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ingestion-api
        uses: docker/build-push-action@v5
        with:
          context: ./ingestion-api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ingestion-api:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ingestion-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push processing-svc
        uses: docker/build-push-action@v5
        with:
          context: ./processing-svc
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-processing-svc:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-processing-svc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
