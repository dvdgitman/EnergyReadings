assignmentId: "a3f8c2d1-4b7e-4f9a-8c2d-1b7e4f9a8c2d"

redis:
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

ingestionApi:
  image:
    repository: energy-ingestion-api
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8000
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

processingSvc:
  image:
    repository: energy-processing-svc
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8001
  consumerName: consumer-1
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  keda:
    minReplicas: 1
    maxReplicas: 10
    pendingEntriesThreshold: "5"


